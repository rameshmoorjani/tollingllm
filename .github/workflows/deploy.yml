name: Deploy to Railway

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Railway
        uses: railway-app/actions-deploy@v1
        with:
          token: ${{ secrets.RAILWAY_TOKEN }}
          service: tolling-llm

      - name: Health Check
        run: |
          sleep 10
          curl -f https://tolling-llm-${{ github.run_number }}.railway.app/api/health || exit 1

      - name: Deployment Success
        run: echo "✅ Deployment successful! Live at Railway.app"
